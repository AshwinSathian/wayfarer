name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      # Vitest runs in real headless Chromium via the Playwright browser
      # provider (angular.json's "test" target), not jsdom - Web Workers
      # (script-sandbox.service.spec.ts), IndexedDB, and WebCrypto all need
      # a real browser, and jsdom stubs none of them faithfully enough.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:ci

  build:
    name: Build (production, budgets enforced)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      # angular.json defines bundle-size budgets under the production
      # configuration (initial: 2mb warning / 5mb error). Angular's own
      # build enforces these and fails the step if they're exceeded, so no
      # extra bundle-size tooling is needed here.
      - run: npm run build -- --configuration=production

  local-bridge:
    name: Local Bridge (zero-dependency Node test suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run bridge:test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
