<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>Wayfarer</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F5F5F7" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Wayfarer is a local-first API client — no account, no cloud, no catch." />
    <!--
      Content-Security-Policy: second line of defense alongside the Web Worker
      script sandbox (see docs/scripts.md). script-src has no 'unsafe-eval' /
      'unsafe-inline', so even a bug that got attacker-controlled markup onto
      the page couldn't turn it into running script. connect-src is wide open
      because sending requests to arbitrary user-specified API hosts is this
      app's core feature, not a gap. worker-src covers Monaco's editor/language
      workers and the script sandbox worker, both same-origin bundled assets.
      style-src allows 'unsafe-inline' for PrimeNG's inline positioning styles
      (overlays/dialogs) — a much smaller blast radius than inline script.
      style-src/font-src also allow Google Fonts (fonts.googleapis.com serves
      the @font-face CSS for Inter/JetBrains Mono/Material Symbols; the actual
      font files are served from fonts.gstatic.com).
      frame-ancestors isn't enforceable via <meta>; see public/_headers for the
      real HTTP-header delivery of this same policy on hosts that serve it.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; worker-src 'self' blob:; connect-src *; object-src 'none'; base-uri 'self'; form-action 'self'; frame-src 'none'; manifest-src 'self'"
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body>
    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
  </body>
</html>
