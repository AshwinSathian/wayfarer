<div class="flex min-h-screen bg-canvas-app text-label-primary">
  <p-drawer
    position="left"
    [visible]="drawerVisible"
    [modal]="isMobile"
    [dismissible]="isMobile"
    [closeOnEscape]="isMobile"
    [blockScroll]="isMobile"
    [showCloseIcon]="false"
    [style]="{ width: drawerWidth }"
    (onHide)="closeDrawer.emit()"
  >
    <div class="flex h-full flex-col">
      <!-- Sidebar header -->
      <div class="flex items-center justify-between px-4 py-3 border-b border-separator">
        <span class="type-title-3 text-label-primary font-semibold tracking-tight">
          API Sandbox
        </span>
        @if (isMobile) {
        <button class="ds-icon-btn" (click)="toggleDrawer.emit()">
          <span class="material-symbols-outlined icon-md">side_navigation</span>
        </button>
        }
      </div>

      @if (isMobile) {
      <div class="px-4 py-3">
        <button
          pButton
          type="button"
          icon="pi pi-plus-circle"
          label="New request"
          outlined
          class="w-full"
          (click)="isMobile ? closeDrawer.emit() : null"
        ></button>
      </div>
      }

      <div class="flex-1 overflow-y-auto px-3 py-3">
        <app-collections-sidebar class="h-full w-full"></app-collections-sidebar>
      </div>

      <!-- History section -->
      <div class="border-t border-separator px-4 py-3">
        <p class="ds-section-label mb-2">Recent History</p>
        <div class="max-h-56 overflow-y-auto rounded-lg">
          <app-past-requests
            [pastRequests]="pastRequests"
            [loading]="historyLoading"
            [displayHeader]="false"
            (loadRequest)="handleLoadRequest($event)"
            (deleteRequest)="deleteRequest.emit($event)"
          ></app-past-requests>
        </div>
      </div>

      <div class="border-t border-separator px-4 py-3">
        <button
          pButton
          type="button"
          severity="danger"
          label="Clear history"
          outlined
          class="w-full"
          [disabled]="historyLoading || !pastRequests.length"
          (click)="confirmClear()"
        ></button>
      </div>
    </div>
  </p-drawer>

  <div
    class="flex flex-1 flex-col transition-all duration-300 ease-standard"
    [ngClass]="{ 'md:ml-[22rem]': !isMobile && drawerVisible }"
  >
    <!-- Top toolbar -->
    <div class="ds-toolbar">
      <div class="flex items-center gap-3">
        <button class="ds-icon-btn" (click)="toggleDrawer.emit()">
          <span class="material-symbols-outlined icon-md">side_navigation</span>
        </button>
        <span class="hidden md:block type-title-3 text-label-secondary font-medium">
          API Sandbox
        </span>
      </div>

      <div class="flex items-center gap-2">
        <p-select
          [options]="dropdownOptions"
          [(ngModel)]="selectedEnvironmentId"
          placeholder="No environment"
          optionLabel="label"
          optionValue="value"
          (onChange)="handleEnvironmentChange($event.value)"
          styleClass="env-switcher"
        ></p-select>

        <button
          class="ds-icon-btn"
          [class.text-status-success]="secretsUnlocked"
          (click)="secretsUnlocked ? lockSecrets() : openLockDialog()"
          [title]="secretsUnlocked ? 'Lock secrets' : 'Unlock secrets'"
        >
          <span class="material-symbols-outlined icon-md">
            {{ secretsUnlocked ? 'lock_open' : 'lock' }}
          </span>
        </button>

        <button
          class="ds-icon-btn"
          (click)="themeService.toggle()"
          [title]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          <span class="material-symbols-outlined icon-md">
            {{ themeService.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}
          </span>
        </button>
      </div>
    </div>

    <main class="flex-1 overflow-y-auto">
      <div class="flex w-full flex-col gap-6 px-4 pb-16 pt-6 md:px-8">
        <div class="flex flex-col gap-6">
          <app-api-params (newRequest)="newRequest.emit()"></app-api-params>
          <app-environments-manager></app-environments-manager>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Unlock secrets dialog -->
<p-dialog
  header="Unlock secrets"
  [(visible)]="lockDialogVisible"
  [modal]="true"
  [dismissableMask]="true"
  [style]="{ width: '380px' }"
>
  <div class="flex flex-col gap-4">
    <p class="type-callout text-label-secondary">
      Enter your passphrase to unlock encrypted secrets for this session.
    </p>
    <input
      pInputText
      type="password"
      class="w-full"
      [(ngModel)]="unlockPassphrase"
      placeholder="Passphrase"
    />
    @if (unlockError) {
    <p class="type-footnote text-status-error">{{ unlockError }}</p>
    }
    <div class="flex justify-end gap-2">
      <button pButton label="Cancel" severity="secondary" outlined (click)="closeLockDialog()"></button>
      <button
        pButton
        label="Unlock"
        [disabled]="!unlockPassphrase"
        (click)="unlockSecrets()"
      ></button>
    </div>
  </div>
</p-dialog>

<!-- Confirm dialog (global) -->
<p-confirmdialog #cd>
  <ng-template
    #headless
    let-message
    let-onAccept="onAccept"
    let-onReject="onReject"
  >
    <div class="flex flex-col items-center p-8 bg-canvas-overlay rounded-2xl">
      <span class="type-title-2 text-label-primary mb-2 mt-4">{{ message.header }}</span>
      <p class="type-body text-label-secondary text-center">{{ message.message }}</p>
      <div class="flex items-center gap-3 mt-6">
        <p-button
          severity="danger"
          label="Proceed"
          (onClick)="onAccept()"
          styleClass="w-28"
        ></p-button>
        <p-button
          label="Cancel"
          text
          severity="secondary"
          [outlined]="true"
          (onClick)="onReject()"
          styleClass="w-28"
        ></p-button>
      </div>
    </div>
  </ng-template>
</p-confirmdialog>
