name: Bug Report
description: Report something that's broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out as
        much of this as you can — it makes triage much faster.

        **Security issue?** Please don't file it here — see
        [SECURITY.md](https://github.com/AshwinSathian/api-sandbox/blob/master/SECURITY.md)
        for the private disclosure process instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what you saw, and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Firefox
        - Safari
        - Edge
        - Other (mention in description)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version / commit
      description: The deployed URL you used, or a commit SHA if running locally.
      placeholder: e.g. api-sandbox.ashwinsathian.com, or commit abc1234
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, console errors, request/response details, anything else useful.
    validations:
      required: false
